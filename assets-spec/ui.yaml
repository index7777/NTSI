      style: docs/art/UI_STYLE_GUIDE.md
    view: { projection: front, angle: straight_on, facing: neutral }
    style:
      linework: handpainted_ink
      proportions: wide_horizontal_selection_strip
      lighting: neutral
      shadow: none
      palette: pale_jade_ink_warm_gold

      proportions: compact_vertical_information_panel
      lighting: neutral
      shadow: none
      palette: warm_ivory_rice_paper_muted_ink_gold
    constraints:
      - newly illustrated original asset, do not crop or trace any reference image
      - one reusable vertical information parchment only
      - clean regular straight edges on all four sides
      - subtle handmade rice-paper fibers with a restrained thin warm-gray border
      - no text, no numbers, no portrait, no divider, no icons, no people
      - no ink wash illustration, no bamboo, no mountain, no plant, no corner painting
      - no outer black fog, no cast shadow, no floor, no wall
      - "perfectly flat solid #00ff00 background outside the parchment"
      - "no #00ff00 color inside the parchment"
      - generous padding and no cropped edges
    manual_checks:
      - clearly differs from the layout reference and is not an extracted panel
      - matches the clean straight-edged parchment panels in the approved game-interface style master
      - remains readable behind live Traditional Chinese text at 230x260 display size
